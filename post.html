<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post — cray_gitbook</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script defer src="js/post.js"></script>
</head>

<body>

    <nav class="nav" id="nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">cray_<span>gitbook</span></a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
            <div style="display:flex; align-items:center; gap:0.5rem;">
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">
                    <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                    </svg>
                    <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5" />
                        <line x1="12" y1="1" x2="12" y2="3" />
                        <line x1="12" y1="21" x2="12" y2="23" />
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                        <line x1="1" y1="12" x2="3" y2="12" />
                        <line x1="21" y1="12" x2="23" y2="12" />
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                    </svg>
                </button>
                <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </nav>

    <div class="page-wrapper">
        <div id="loadingState" class="state-box" style="padding-top:8rem;">
            <div class="state-icon">⏳</div>
            <div class="state-msg">Loading post…</div>
        </div>

        <div id="errorState" class="state-box hidden" style="padding-top:8rem;">
            <div class="state-icon">⚠️</div>
            <div class="state-msg" id="errorMsg">Post not found</div>
            <div class="state-sub"><a href="blog.html" style="color:var(--accent)">← Browse all posts</a></div>
        </div>

        <div id="postLayout" class="post-layout hidden">
            <main>
                <a href="blog.html" class="back-btn">← Back to Blog</a>
                <header class="post-header">
                    <div class="post-meta-row" id="postMetaRow"></div>
                    <h1 class="post-title" id="postTitle"></h1>
                    <div class="post-meta-row" id="postMetaBottom"></div>
                </header>
                <article class="post-content" id="postContent"></article>
            </main>

            <aside class="toc-sidebar" id="tocSidebar">
                <div class="toc-card">
                    <div class="toc-label">Contents</div>
                    <ul class="toc-list" id="tocList"></ul>
                </div>
            </aside>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-inner">
            <span class="nav-logo" style="font-size:1rem;">cray_<span style="color:var(--accent)">gitbook</span></span>
            <div class="footer-copy">&copy; 2026 cray_gitbook</div>
        </div>
    </footer>

    <script>
        // Dark Mode
        (function () {
            const root = document.documentElement;
            const THEME_KEY = 'cg-theme';
            function applyTheme(t) { root.setAttribute('data-theme', t); localStorage.setItem(THEME_KEY, t); }
            const saved = localStorage.getItem(THEME_KEY);
            applyTheme(saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
            document.getElementById('themeToggle').addEventListener('click', () => {
                applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
            });
        })();
        document.getElementById('navToggle').addEventListener('click', () =>
            document.getElementById('navLinks').classList.toggle('open'));
    </script>
</body>

</html>
