<body>

    <nav class="nav" id="nav">

            <ul class="nav-links" id="navLinks">

            </ul>
            <div style="display:flex; align-items:center; gap:0.5rem;">
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">
                    <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                    </svg>
                    <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5" />
                        <line x1="12" y1="1" x2="12" y2="3" />
                        <line x1="12" y1="21" x2="12" y2="23" />
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                        <line x1="1" y1="12" x2="3" y2="12" />
                        <line x1="21" y1="12" x2="23" y2="12" />
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />

                </button>
                <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </nav>

    <div class="page-wrapper">
        <div class="container" style="padding-top: 3rem; padding-bottom: 0.5rem;">
            <span class="section-eyebrow">Archive</span>
            <h1 class="section-title" style="text-align:left; margin-top:0.5rem;">All Posts</h1>
            <p class="section-sub">CTF writeups, research notes, and informational articles.</p>
        </div>

        <div class="container" style="padding-top: 1.75rem;">
            <div class="search-area">
                <div class="search-bar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.35-4.35" />
                    </svg>
                    <input type="text" class="search-input" id="searchInput" placeholder="Search posts…"
                        autocomplete="off" />
                </div>
                <div class="filter-tabs" id="filterTabs">
                    <button class="filter-tab active" data-category="all">All</button>
                    <button class="filter-tab" data-category="article">Articles</button>
                    <button class="filter-tab" data-category="ctf">CTF Writeups</button>
                </div>
            </div>
        </div>

        <div class="container section-sm">
            <div id="postCount" style="font-size:0.82rem; color:var(--text-muted); margin-bottom:1.25rem;"></div>
            <div class="posts-grid" id="postsGrid">
                <div class="skeleton" style="height:200px; border-radius:12px;"></div>
                <div class="skeleton" style="height:200px; border-radius:12px;"></div>
            </div>
            <div id="emptyState" class="state-box hidden">
                <div class="state-icon">🔍</div>
                <div class="state-msg">No posts found</div>
                <div class="state-sub">Try a different search term or category.</div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-inner">
            <span class="nav-logo" style="font-size:1rem;">cray_<span style="color:var(--accent)">gitbook</span></span>
            <div class="footer-links">
                <a href="https://github.com/cray4367" target="_blank" rel="noopener">GitHub</a>
                <a href="https://www.linkedin.com/in/akshat-singh-1311ca/" target="_blank" rel="noopener">LinkedIn</a>
                <a href="mailto:sghakshat11@gmail.com">Email</a>
                <a href="about.html">About</a>
            </div>
            <div class="footer-copy">&copy; 2026 cray_gitbook</div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('navToggle').addEventListener('click', () =>
            document.getElementById('navLinks').classList.toggle('open'));
        document.addEventListener('click', e => {
            if (!e.target.closest('.nav')) document.getElementById('navLinks').classList.remove('open');
        });
        // Dark Mode
        (function () {
            const root = document.documentElement;
            const THEME_KEY = 'cg-theme';
            function applyTheme(t) { root.setAttribute('data-theme', t); localStorage.setItem(THEME_KEY, t); }
            const saved = localStorage.getItem(THEME_KEY);
            applyTheme(saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
            document.getElementById('themeToggle').addEventListener('click', () => {
                applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
            });
        })();
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', function () {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                applyFilters();
            });
        });
        document.getElementById('searchInput').addEventListener('input', applyFilters);
    </script>
</body>

</html>
